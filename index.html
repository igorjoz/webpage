<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link 
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" 
    rel="stylesheet"
  >

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Inter", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: rgba(15, 23, 42, 0.9);
      padding: 42px;
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      text-align: center;
      max-width: 420px;
      border: 1px solid rgba(148, 163, 184, 0.25);
    }

    h1 {
      font-size: 44px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #38bdf8;
      letter-spacing: -1px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #cbd5e1;
      margin-bottom: 28px;
    }

    button {
      font-family: inherit;
      background: #2563eb;
      color: white;
      border: none;
      padding: 13px 26px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.35);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Hello World</h1>
    <p>Prosta, elegancka strona w ciemnym motywie z nowoczesną czcionką.</p>
    <button>Kliknij mnie</button>
  </div>

</body>
</html>
